name: pickles_factory
description: Pickles Factory Management System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # HTTP client for API calls
  http: ^1.1.0
  
  # State management
  provider: ^6.1.1
  
  # Local storage for JWT token
  shared_preferences: ^2.2.2
  
  # Internationalization
  intl: ^0.20.2
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # PDF generation
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Image picker for restaurant photos
  image_picker: ^1.0.7
  
  # Path provider for file storage
  path_provider: ^2.1.2
  
  # Charts for analytics
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
